[pytest]
# Режим asyncio: все тесты автоматически обрабатываются как async
asyncio_mode = auto

# Количество повторных попыток при падении (только в CI; локально = 0)
# Переопределяется через: pytest --reruns=2
# reruns = 0

# Таймаут на тест (секунды)
timeout = 60

# Маркеры
markers =
    e2e: end-to-end тесты через браузер
    api: тесты через Matrix API
    smoke: быстрые проверки критических сценариев
    flaky: нестабильные тесты (в карантине)

# HTML-отчёт (требует pytest-html)
# addopts = --html=reports/report.html --self-contained-html

# JUnit XML для GitLab CI
# addopts = --junitxml=reports/junit.xml

# Playwright — браузер по умолчанию
# Переопределяется через CLI: --browser firefox
[playwright]
browser = chromium
headed = false
